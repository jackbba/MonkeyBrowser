name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: macos-14
    name: Build MonkeyBrowser IPA
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod install || true

      - name: Build App
        run: |
          BUILD_CONFIG="${{ github.event.inputs.build_type || 'release' }}"
          
          # Detect workspace or project
          if [ -d "MonkeyBrowser.xcworkspace" ]; then
            BUILD_INPUT="MonkeyBrowser.xcworkspace"
          else
            BUILD_INPUT="MonkeyBrowser.xcodeproj"
          fi
          
          xcodebuild clean build \
            -project "$BUILD_INPUT" \
            -scheme "MonkeyBrowser" \
            -configuration "$BUILD_CONFIG" \
            -derivedDataPath build \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Create IPA
        run: |
          mkdir -p ipa/Payload
          
          # Find .app file
          APP_PATH=$(find build -name "MonkeyBrowser.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app not found"
            exit 1
          fi
          
          cp -R "$APP_PATH" ipa/Payload/
          
          cd ipa
          zip -r "../MonkeyBrowser.ipa" Payload/
          cd ..

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonkeyBrowser-${{ github.sha }}
          path: MonkeyBrowser.ipa
          retention-days: 30

      - name: Create Release
        if: github.event.inputs.build_type == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: MonkeyBrowser.ipa
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
