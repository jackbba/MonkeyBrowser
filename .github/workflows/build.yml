name: Build IPA

on:
  push:
    branches: [ main, master, clean-main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: macos-14
    name: Build MonkeyBrowser IPA

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod install

      - name: Verify Workspace
        run: |
          ls -la
          echo "---"
          ls -la MonkeyBrowser.xcworkspace/

      - name: Build App
        run: |
          BUILD_CONFIG="${{ github.event.inputs.build_type || 'release' }}"

          # Use workspace if Pods exist, otherwise project
          if [ -d "MonkeyBrowser.xcworkspace" ]; then
            BUILD_INPUT="MonkeyBrowser.xcworkspace"
            echo "Using workspace: $BUILD_INPUT"
          else
            BUILD_INPUT="MonkeyBrowser.xcodeproj"
            echo "Using project: $BUILD_INPUT"
          fi

          xcodebuild clean build \
            -workspace "$BUILD_INPUT" \
            -scheme "MonkeyBrowser" \
            -configuration "$BUILD_CONFIG" \
            -derivedDataPath build \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Find and Verify .app
        run: |
          echo "=== Searching for .app file ==="
          find . -name "MonkeyBrowser.app" -type d
          echo "=== Build directory contents ==="
          ls -la build/Build/Products/ 2>/dev/null || echo "No build products dir"

      - name: Create IPA
        run: |
          mkdir -p ipa/Payload

          # Find .app file in multiple possible locations
          APP_PATH=$(find build -name "MonkeyBrowser.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "Error: .app not found anywhere"
            exit 1
          fi

          echo "Found app at: $APP_PATH"
          ls -la "$APP_PATH"
          cp -R "$APP_PATH" ipa/Payload/

          cd ipa
          zip -r "../MonkeyBrowser.ipa" Payload/
          cd ..

          ls -la MonkeyBrowser.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MonkeyBrowser-${{ github.sha }}
          path: MonkeyBrowser.ipa
          retention-days: 30