name: Build & Sign IPA (Jailbreak)

on:
  workflow_dispatch:
    inputs:
      team_id:
        description: 'Apple Team ID (leave empty for ad-hoc)'
        required: false
        type: string

jobs:
  build-signed:
    runs-on: macos-14
    name: Build Signed IPA

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Install CocoaPods
        run: |
          gem install cocoapods
          pod install || true

      - name: Build App
        env:
          TEAM_ID: ${{ github.event.inputs.team_id }}
        run: |
          TEAM_ARG=""
          if [ -n "$TEAM_ID" ]; then
            TEAM_ARG="DEVELOPMENT_TEAM=$TEAM_ID"
          fi
          
          xcodebuild clean build \
            -project MonkeyBrowser.xcodeproj \
            -scheme "MonkeyBrowser" \
            -configuration Release \
            -derivedDataPath build \
            -destination "generic/platform=iOS" \
            $TEAM_ARG \
            | xcpretty

      - name: Create IPA
        run: |
          mkdir -p ipa/Payload
          APP_PATH=$(find build -name "MonkeyBrowser.app" -type d | head -1)
          cp -R "$APP_PATH" ipa/Payload/
          cd ipa
          zip -r "../MonkeyBrowser.ipa" Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MonkeyBrowser-signed
          path: MonkeyBrowser.ipa
          retention-days: 30
